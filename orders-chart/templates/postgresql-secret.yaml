{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.postgresql.name }}-secret
  labels:
    {{- include "postgresql.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $val := .Values.postgresql.secret }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
{{- end }}
