{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.postgresql.name }}-config
  labels:
    {{- include "postgresql.labels" . | nindent 4 }}
data:
  {{- range $key, $val := .Values.postgresql.config }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
{{- end }}
