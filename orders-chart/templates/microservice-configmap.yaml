{{- range $name, $svc := .Values.microservices }}
{{- if $svc.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $svc.name }}-config
  labels:
    {{- include "microservice.labels" $svc | nindent 4 }}
data:
  {{- range $key, $val := $svc.config }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
---
{{- end }}
{{- end }}
